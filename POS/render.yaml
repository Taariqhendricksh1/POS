services:
  # Backend API
  - type: web
    name: pos-api
    runtime: docker
    dockerfilePath: ./POS/POS.Api/Dockerfile
    dockerContext: ./POS/POS.Api
    plan: free
    envVars:
      - key: ASPNETCORE_ENVIRONMENT
        value: Production
      - key: MongoDb__ConnectionString
        sync: false # Set manually in Render dashboard
      - key: MongoDb__DatabaseName
        value: pos_db
      - key: Email__SmtpServer
        value: smtp.gmail.com
      - key: Email__SmtpPort
        value: "587"
      - key: Email__SenderEmail
        sync: false
      - key: Email__SenderName
        value: POS Store
      - key: Email__Password
        sync: false
      - key: Email__UseSsl
        value: "true"
      - key: App__CompanyName
        value: My POS Store
      - key: App__DefaultTaxRate
        value: "15"
      - key: App__CurrencySymbol
        value: R
      - key: App__InvoicePrefix
        value: INV
    healthCheckPath: /api/products/shops

  # Frontend
  - type: web
    name: pos-frontend
    runtime: docker
    dockerfilePath: ./pos-frontend/Dockerfile
    dockerContext: ./pos-frontend
    plan: free
    envVars:
      - key: API_URL
        sync: false # Set to your API URL after deploy, e.g. https://pos-api.onrender.com
